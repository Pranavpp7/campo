# Campo — Infrastructure Services
# Starts Qdrant (vector store) and Redis (session memory) as named-volume
# containers so data survives restarts without Windows/WSL mount issues.
#
# Usage:
#   Start:   docker compose up -d
#   Stop:    docker compose down          (keeps data)
#   Wipe:    docker compose down -v       (destroys data — careful)
#   Logs:    docker compose logs -f
#   Status:  docker compose ps

services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: campo-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API — used by the app
      - "6334:6334"   # gRPC (available, not currently used)
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # Qdrant exposes /healthz — poll it until the service is ready
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: campo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local